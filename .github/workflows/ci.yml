name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs:

  lint:
    name: linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13
      - name: Install dependencies
        shell: bash
        run: |
            python -m pip install --upgrade pip
            pip install black flake8 invoke
      - name: Lint
        shell: bash
        run: |
            invoke checkformat
            invoke lint

  tests:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # The test suite needs a PostgreSQL database. Service containers are only
    # available on Linux runners, so we test on Linux only.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: timetagger
          POSTGRES_PASSWORD: timetagger
          POSTGRES_DB: timetagger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U timetagger"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    strategy:
      matrix:
        include:
          - name: Linux py39
            os: ubuntu-latest
            pyversion: '3.9'
          - name: Linux py310
            os: ubuntu-latest
            pyversion: '3.10'
          - name: Linux py311
            os: ubuntu-latest
            pyversion: '3.11'
          - name: Linux py312
            os: ubuntu-latest
            pyversion: '3.12'
          - name: Linux py313
            os: ubuntu-latest
            pyversion: '3.13'
    env:
      TIMETAGGER_DB_URI: postgresql://timetagger:timetagger@localhost:5432/timetagger
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.pyversion }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.pyversion }}
      - name: Install dependencies
        shell: bash
        run: |
            python -m pip install --upgrade pip
            pip install -U -r requirements.txt
            pip install pytest requests setuptools .
            rm -rf ./timetagger ./build ./egg-info
      - name: Test with pytest
        shell: bash
        run: |
            python -c "import sys; print(sys.version, '\n', sys.prefix)";
            pytest -v .
