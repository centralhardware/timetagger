# Example docker-compose file for TimeTagger with a PostgreSQL backend.
#
# TimeTagger stores all user data in PostgreSQL. Login credentials are also
# stored in the database; manage them with:
#
#   docker compose exec timetagger python -m timetagger user-add <name> <pw>
#   docker compose exec timetagger python -m timetagger user-list
#   docker compose exec timetagger python -m timetagger user-remove <name>
#
# Set TIMETAGGER_JWT_KEY to a long random secret so the deployment is fully
# stateless (no volume needed for TimeTagger itself).

services:
  timetagger:
    image: ghcr.io/centralhardware/timetagger:latest
    ports:
      # The image runs unprivileged (UID 1000), so it binds a non-privileged
      # port inside the container; map it to whatever host port you like.
      - "80:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - TIMETAGGER_BIND=0.0.0.0:8080
      - TIMETAGGER_DB_URI=postgresql://timetagger:timetagger@db:5432/timetagger
      - TIMETAGGER_JWT_KEY=change-me-to-a-long-random-secret
      - TIMETAGGER_LOG_LEVEL=info

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=timetagger
      - POSTGRES_PASSWORD=timetagger
      - POSTGRES_DB=timetagger
    volumes:
      - ./_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timetagger"]
      interval: 5s
      timeout: 5s
      retries: 10
