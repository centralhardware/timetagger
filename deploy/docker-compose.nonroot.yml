# Example docker-compose file for TimeTagger (nonroot image) with a
# PostgreSQL backend. See docker-compose.yml for notes on managing users.
#
# With TIMETAGGER_JWT_KEY set, the timetagger container needs no volume.

services:
  timetagger:
    image: ghcr.io/centralhardware/timetagger:latest-nonroot
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - TIMETAGGER_BIND=0.0.0.0:80
      - TIMETAGGER_DB_URI=postgresql://timetagger:timetagger@db:5432/timetagger
      - TIMETAGGER_JWT_KEY=change-me-to-a-long-random-secret
      - TIMETAGGER_LOG_LEVEL=info

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=timetagger
      - POSTGRES_PASSWORD=timetagger
      - POSTGRES_DB=timetagger
    volumes:
      - ./_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timetagger"]
      interval: 5s
      timeout: 5s
      retries: 10
